<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Formulário Pessoa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-..." crossorigin="anonymous">
</head>
<body>
<h1 th:text="${pessoa.id != null} ? 'Editar Pessoa' : 'Nova Pessoa'"></h1>    
<form th:action="@{${pessoa.id} != null ? '/pessoas/update/' + ${pessoa.id} : '/pessoas'}" th:object="${pessoa}" class="container mt-4" method="post">
    <div class="row">
        <div class="col-3"></div>
        <div class="col-3">
           <label>CPF:</label>
           <input type="text" th:field="*{cpf}" class="form-control">
           <div th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></div>
         </div>         
         <div class="col-3">            
           <label>Nome:</label>
           <input type="text" th:field="*{nome}" class="form-control">
           <div th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
         </div>   
         <div class="col-3"></div>
    </div>
    <div class="row">
        <div class="col-3"></div>
        <div class="col-3">
           <label>Email:</label>
           <input type="email" th:field="*{email}" class="form-control">
            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>    
        <div class="col-3"></div>
        <div class="col-3"></div>
    </div>
    <div class="row">
        <div class="col-3"></div>
        <div class="col-3"><br>
           <button type="submit" class="btn btn-success w-100">Salvar</button>
        </div>
        <div class="col-3"><br>          
           <a th:href="@{/pessoas}" class="btn btn-primary w-100">
             <i class="bi bi-plus-circle"></i>
             Cancelar
           </a>                     
        </div>
        <div class="col-3"></div>
    </div>
</form>
</body>
</html>
