<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Lista de Pessoas</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-..." crossorigin="anonymous">
</head>
<body>
<h1>Lista de Pessoas</h1>
 <a th:href="@{/pessoas/novo}" class="btn btn-primary">Adicionar</a> 
 <a th:href="@{/pessoas/hello}" class="btn btn-success">Mensagem</a>
 <a th:href="@{/pessoas/whatszap}" class="btn btn-danger">Whatszap</a> 
 <div class="row">
    <div class="col">ID</div>
    <div class="col">CPF</div>
    <div class="col">Nome</div>
    <div class="col">Email</div>
    <div class="col">Acoes</div>
 </div>
 <div class="row" th:each="p : ${pessoas}">        
    <div class="col" th:text="${p.id}"></div>
    <div class="col" th:text="${p.cpf}"></div>
    <div class="col" th:text="${p.nome}"></div>
    <div class="col" th:text="${p.email}"></div>
    <div class="col">    
      <a th:href="@{'/pessoas/editar/'+ ${p.id}}" class="btn btn-primary">
         <i class="bi bi-plus-circle"></i>
         Editar
      </a>
      <a th:href="@{'/pessoas/remover/'+ ${p.id}}" class="btn btn-danger" onclick="return confirm('Tem certeza?')" >
         <i class="bi bi-plus-circle"></i>
         Remover
      </a>      
    </div>        
 </div>    
 <nav aria-label="Page navigation">
  <ul class="pagination justify-content-center">
    <li class="page-item" th:classappend="${pessoaPage.hasPrevious()} ? '' : 'disabled'">
      <a class="page-link" th:href="@{'/pessoas'(page=${pessoaPage.number - 1})}">Previous</a>
    </li>
    <li class="page-item" th:each="i : ${#numbers.sequence(0, pessoaPage.totalPages - 1)}" th:classappend="${i == pessoaPage.number} ? 'active' : ''">
      <a class="page-link" th:href="@{'/pessoas'(page=${i})}" th:text="${i + 1}"></a>
    </li>
    <li class="page-item" th:classappend="${pessoaPage.hasNext()} ? '' : 'disabled'">
      <a class="page-link" th:href="@{'/pessoas'(page=${pessoaPage.number + 1})}">Next</a>
    </li>
  </ul>
 </nav>
</body>
</html>
