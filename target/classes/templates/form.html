<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Formulário Pessoa</title>
</head>
<body>
<h1 th:text="${#fields.hasErrors()} ? 'Editar Pessoa' : 'Nova Pessoa'"></h1>
<form th:action="@{${pessoa.id} != null ? '/pessoas/update/' + ${pessoa.id} : '/pessoas'}" th:object="${pessoa}" method="post">
    <div>
        <label>CPF:</label>
        <input type="text" th:field="*{cpf}" />
        <div th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></div>
    </div>
    <div>
        <label>Nome:</label>
        <input type="text" th:field="*{nome}" />
        <div th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
    </div>
    <div>
        <label>Email:</label>
        <input type="email" th:field="*{email}" />
        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
    </div>
    <div>
        <button type="submit">Salvar</button>
        <a th:href="@{/pessoas}">Cancelar</a>
    </div>
</form>
</body>
</html>
